# Dev compose — builds wheels from local sibling repos.
# Prerequisite: okto-pulse-core/ must be cloned as a sibling of okto-pulse/.
#
# Usage (from okto-pulse/):
#   docker compose build          # build image from local source
#   docker compose up -d          # start in background
#   docker compose logs -f        # stream logs
#   docker compose down           # stop and remove container
#
# After first boot, export the MCP discovery file for Claude Code / Cursor:
#   docker compose exec okto-pulse okto-pulse init --agents claude
#   docker compose cp okto-pulse:/app/.mcp.json ./.mcp.json

services:
  okto-pulse:
    build:
      context: ..
      dockerfile: okto-pulse/Dockerfile
      target: local-runtime
    image: okto-pulse:local
    container_name: okto-pulse
    ports:
      - "127.0.0.1:8100:8100"
      - "127.0.0.1:8101:8101"
    environment:
      HOST: "0.0.0.0"
      MCP_HOST: "0.0.0.0"
      DATA_DIR: "/data"
      KG_BASE_DIR: "/data"
      HF_HOME: "/opt/hf-cache"
      # Set MCP_TRACE_ENABLED=1 in your shell to record every MCP tool call to
      # /data/mcp_traces/session_*.jsonl for replay testing. Off by default.
      MCP_TRACE_ENABLED: "${MCP_TRACE_ENABLED:-}"
      MCP_TRACE_DIR: "${MCP_TRACE_DIR:-/data/mcp_traces}"
    volumes:
      - okto-pulse-data:/data
    restart: unless-stopped

volumes:
  okto-pulse-data:
