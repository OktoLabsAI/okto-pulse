server {
    listen 80;

    # API proxy - route through BFF (ecosystem standard)
    location /api/ {
        proxy_pass http://bff:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Upload files (served directly from shared volume)
    location /uploads/ {
        alias /app/uploads/;
    }

    # SPA fallback - serves from /pulse/ base path
    location /pulse/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /pulse/index.html;
    }

    # Redirect root to /pulse/
    location = / {
        return 302 /pulse/;
    }
}
