name: CI

# PR + main CI for okto-pulse.
# Runs the same pytest gate as the release pipeline plus a Dockerfile build verify,
# but does NOT push any image. Gives early feedback on PRs and main commits before
# you cut a release tag.
#
# The release pipeline (release.yml) re-runs these gates on the tagged commit, so
# this workflow is purely about catching breakage early.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: pytest + docker build verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout okto-pulse
        uses: actions/checkout@v4
        with:
          path: okto-pulse

      # okto-pulse-core is a sibling repo that okto-pulse depends on at build time.
      # On PR/main runs we just track core's main; release.yml pins to a matching tag.
      - name: Checkout okto-pulse-core (main)
        uses: actions/checkout@v4
        with:
          repository: OktoLabsAI/okto-pulse-core
          ref: main
          path: okto-pulse-core
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: okto-pulse-core/pyproject.toml

      - name: Install okto-pulse-core + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ./okto-pulse-core
          pip install pytest pytest-asyncio psutil httpx

      - name: Pytest gate (kg lifecycle + file handles, strict ResourceWarning)
        working-directory: okto-pulse-core
        # Targeted gate — same files core's CI runs as its strict gate.
        # The full kg suite has slow tests that aren't PR blockers.
        run: |
          python -W error::ResourceWarning -m pytest -x --tb=short -q \
            tests/test_kg_schema_lifecycle.py \
            tests/test_kg_file_handles.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build verify only — no GHCR push on PR/main.
      # Context is the workspace root because the Dockerfile uses sibling layout
      # (COPY okto-pulse-core/ and COPY okto-pulse/).
      - name: Docker build (verify only, not pushed)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: okto-pulse/Dockerfile
          target: local-runtime
          push: false
          tags: okto-pulse:ci-${{ github.sha }}
